<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Pricing Configuration</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav__brand">Admin Panel</span>
    <div class="nav__links">
      <a href="admin.html">All Orders</a>
      <button class="btn btn--secondary btn--sm" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-body">

      <h1 class="page-title">Pricing Configuration</h1>

      <div id="loadingMsg" class="msg msg--info">Loading configuration…</div>
      <div id="errorMsg" class="msg msg--error hidden"></div>
      <div id="successMsg" class="msg msg--success hidden"></div>

      <div id="tableSection" class="hidden">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Key</th>
                <th>Value</th>
                <th>Last updated</th>
                <th>Save</th>
              </tr>
            </thead>
            <tbody id="configBody">
              <!-- Populated by admin.js -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/api-client.js"></script>
  <script src="/js/admin-panel.js"></script>
</body>
</html>
